name: Spreadsheet demo build

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/spreadsheet-demo-build.yml'
      - '.github/workflows/spreadsheet-cloudflare-pages.yml'
      - 'moon.work'
      - 'incr/cells/**'
      - 'incr/incr.mbt'
      - 'incr/moon.mod'
      - 'incr/moon.pkg'
      - 'incr/traits.mbt'
      - 'examples/typed_spreadsheet/**'
      - 'incr/types/**'
      - 'examples/typed_spreadsheet_demo/**'
      - 'examples/typed_spreadsheet_rabbita_demo/**'
      - 'examples/typed_spreadsheet_incr_tea_demo/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEW_MOON_MOD: '0'

jobs:
  build:
    name: Build typed spreadsheet demos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        uses: hustcer/setup-moonbit@v1.22
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        run: moon update

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            examples/typed_spreadsheet_rabbita_demo/package-lock.json
            examples/typed_spreadsheet_incr_tea_demo/package-lock.json

      - name: Install demo dependencies
        working-directory: examples/typed_spreadsheet_rabbita_demo
        run: npm ci

      - name: Build demo
        working-directory: examples/typed_spreadsheet_rabbita_demo
        run: npm run build

      - name: Smoke built demo
        working-directory: examples/typed_spreadsheet_rabbita_demo
        run: npm run smoke

      - name: Install incr_tea proof dependencies
        working-directory: examples/typed_spreadsheet_incr_tea_demo
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: examples/typed_spreadsheet_incr_tea_demo
        run: npx playwright install --with-deps chromium

      - name: Browser-test incr_tea proof
        working-directory: examples/typed_spreadsheet_incr_tea_demo
        run: npm run test:dom
