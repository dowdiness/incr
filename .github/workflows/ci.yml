name: CI

# Runs `moon check` + `moon test` for the library and the checked literate
# `.mbt.md` examples in the docs module, so the public-facade contract and the
# documentation drift guard are verified automatically (issue #227).
#
# The existing spreadsheet-demo deploy workflows are intentionally left alone;
# this workflow only covers library/docs verification.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# NEW_MOON_MOD=0 keeps moon on the committed manifests and disables the
# experimental moon.mod auto-migration. Set workspace-wide so every `moon`
# invocation in every step inherits it.
env:
  NEW_MOON_MOD: '0'

jobs:
  library:
    name: Check + Test library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Install via the official MoonBit script (pinned) wrapped in a retry.
      # We deliberately do NOT use hustcer/setup-moonbit: it pulls a Nu binary
      # from a GitHub-releases CDN that intermittently 504s, reddening a random
      # leg ~once per run (issue #229). The official script fetches only the
      # pinned toolchain + core from cli.moonbitlang.com (no Nu), and the retry
      # loop absorbs transient blips. Pinned for reproducibility (issue #227).
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.3+16975d007
        run: |
          install_moonbit() {
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh \
              && bash /tmp/moonbit-install.sh
          }
          for attempt in 1 2 3; do
            if install_moonbit; then break; fi
            if [ "$attempt" = 3 ]; then
              echo "MoonBit install failed after 3 attempts"; exit 1
            fi
            echo "install attempt $attempt failed; retrying in 10s..."; sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: incr
        run: moon update

      - name: moon check
        working-directory: incr
        run: moon check

      - name: moon test
        working-directory: incr
        run: moon test

  docs:
    name: Check + Test docs examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Install via the official MoonBit script (pinned) wrapped in a retry.
      # We deliberately do NOT use hustcer/setup-moonbit: it pulls a Nu binary
      # from a GitHub-releases CDN that intermittently 504s, reddening a random
      # leg ~once per run (issue #229). The official script fetches only the
      # pinned toolchain + core from cli.moonbitlang.com (no Nu), and the retry
      # loop absorbs transient blips. Pinned for reproducibility (issue #227).
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.3+16975d007
        run: |
          install_moonbit() {
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh \
              && bash /tmp/moonbit-install.sh
          }
          for attempt in 1 2 3; do
            if install_moonbit; then break; fi
            if [ "$attempt" = 3 ]; then
              echo "MoonBit install failed after 3 attempts"; exit 1
            fi
            echo "install attempt $attempt failed; retrying in 10s..."; sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        working-directory: docs
        run: moon update

      # Plain `moon test` does NOT pick up the literate `.mbt.md` examples — each
      # checked file must be passed explicitly. `moon check` exercises `mbt check`
      # blocks (no test body) and `moon test` exercises blocks with test bodies.
      # The docs module is a `moon.work` member alongside `incr/`, so these
      # examples resolve `dowdiness/incr` from the local library source — this is
      # what makes the checks a real drift guard against the working tree.
      - name: Check + test checked literate examples
        working-directory: docs
        run: |
          status=0
          for f in *.mbt.md; do
            echo "::group::$f"
            moon check "$f" || status=1
            moon test "$f" || status=1
            echo "::endgroup::"
          done
          exit $status

  boundaries:
    name: Check architecture boundaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Engine isolation invariants (incr/cells/internal)
        run: bash scripts/check-engine-isolation.sh

      - name: Boundary checker self-test (known-positive controls)
        run: bash scripts/check-workspace-boundaries-selftest.sh

      - name: Workspace boundary + pin invariants (examples, docs)
        run: bash scripts/check-workspace-boundaries.sh

  docs-ratios:
    name: Verify perf ratio tables
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify TEA inactive-root cohort ratios
        run: |
          python3 scripts/verify-perf-ratios.py \
            --shared docs/performance/2026-06-15-incr-tea-inactive-root-cohorts.md \
            --independent docs/performance/2026-06-16-incr-tea-independent-inactive-root-cohorts.md \
            --synthesis docs/performance/2026-06-16-incr-tea-shared-vs-independent-inactive-root-cohorts.md \
            --verify

  # Example workspace members are gated against the LOCAL incr source (workspace
  # mode, no MOON_WORK=off), with sibling-member deps resolved through the
  # workspace — so an incr/ API break that reaches an example fails here in the
  # same PR, and the demos that depend on `examples/typed_spreadsheet` still
  # resolve.
  #
  # Why per-package paths instead of a bare `moon test`: in this workspace a bare
  # `moon test` from a member dir runs the incr module, not the member; and
  # `moon test <module-path>` runs only that module's ROOT package (missing e.g.
  # `typed_spreadsheet/tests`). So we enumerate every package dir under the
  # member and check+test each explicitly. Passing the path keeps resolution in
  # workspace mode (local incr) — the same mechanism the `docs` job relies on.
  #
  # `examples/spikes/ideal_api_rename_phase0` is intentionally NOT gated: a
  # publish-excluded, frozen language-mechanics probe with no tests.
  examples:
    name: Check + Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: example typed_spreadsheet
            path: examples/typed_spreadsheet
            args: ''
          - name: example typed_spreadsheet_demo
            path: examples/typed_spreadsheet_demo
            args: ''
          - name: example typed_spreadsheet_cli_demo
            path: examples/typed_spreadsheet_cli_demo
            args: ''
          - name: example typed_spreadsheet_rabbita_demo
            path: examples/typed_spreadsheet_rabbita_demo
            args: '--target js'
          - name: example typed_spreadsheet_incr_tea_demo
            path: examples/typed_spreadsheet_incr_tea_demo
            args: '--target js'
          - name: incr_tea framework
            path: incr_tea
            args: '--target js'
          - name: example incr_tea
            path: examples/incr_tea
            args: '--target js'
          - name: example incr_tea_7guis
            path: examples/incr_tea_7guis
            args: '--target js'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # See the library job for why we use the official script (issue #229) and
      # the pin rationale (issue #227).
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.3+16975d007
        run: |
          install_moonbit() {
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh \
              && bash /tmp/moonbit-install.sh
          }
          for attempt in 1 2 3; do
            if install_moonbit; then break; fi
            if [ "$attempt" = 3 ]; then
              echo "MoonBit install failed after 3 attempts"; exit 1
            fi
            echo "install attempt $attempt failed; retrying in 10s..."; sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        run: moon update

      # Check + test every package directory under the member. Workspace mode
      # (no MOON_WORK=off) resolves incr from the local source and sibling
      # members from the workspace. `--target js` is applied for js-only members.
      - name: Check + test member packages
        run: |
          status=0
          pkgs=$(find "${{ matrix.path }}" -name moon.pkg \
            -not -path '*/_build/*' -not -path '*/.mooncakes/*' -exec dirname {} \;)
          for p in $pkgs; do
            echo "::group::$p"
            moon check ${{ matrix.args }} "$p" || status=1
            moon test ${{ matrix.args }} "$p" || status=1
            echo "::endgroup::"
          done
          exit $status

  #-------------------------------------------------------------------------------
  # DOM (Playwright) structural test for the incr_tea machine-composition driver
  #-------------------------------------------------------------------------------
  # Timing remains a manually recorded benchmark. This job makes the deterministic
  # semantic-identity, mutation-locality, and stale-result gates permanent.
  incr_tea-machine-composition-dom:
    name: DOM test incr_tea machine composition
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.3+16975d007
        run: |
          install_moonbit() {
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh \
              && bash /tmp/moonbit-install.sh
          }
          for attempt in 1 2 3; do
            if install_moonbit; then break; fi
            if [ "$attempt" = 3 ]; then
              echo "MoonBit install failed after 3 attempts"; exit 1
            fi
            echo "install attempt $attempt failed; retrying in 10s..."; sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        run: moon update

      - name: Install npm dependencies
        working-directory: examples/incr_tea
        run: npm ci

      - name: Install Playwright chromium + system deps
        working-directory: examples/incr_tea
        run: npx playwright install chromium --with-deps

      - name: Run machine-composition structural DOM test
        working-directory: examples/incr_tea
        run: npm run test:machine-composition

  #-------------------------------------------------------------------------------
  # DOM (Playwright) test for the incr_tea 7GUIs example
  #-------------------------------------------------------------------------------
  # Exercises the full build pipeline (MoonBit JS release + Vite bundling) then
  # runs real browser interactions against the served bundle via Playwright.
  # This is kept separate from the examples matrix because it requires npm
  # dependencies, a Vite build step, and system-level browser setup.
  incr_tea_7guis-dom:
    name: DOM test incr_tea_7guis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # See the library job for why we use the official script (issue #229) and
      # the pin rationale (issue #227).
      - name: Install MoonBit
        env:
          MOONBIT_INSTALL_VERSION: 0.10.3+16975d007
        run: |
          install_moonbit() {
            curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh \
              && bash /tmp/moonbit-install.sh
          }
          for attempt in 1 2 3; do
            if install_moonbit; then break; fi
            if [ "$attempt" = 3 ]; then
              echo "MoonBit install failed after 3 attempts"; exit 1
            fi
            echo "install attempt $attempt failed; retrying in 10s..."; sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Verify MoonBit
        run: moon version --all

      - name: moon update
        run: moon update

      - name: Install npm dependencies
        working-directory: examples/incr_tea_7guis
        run: npm ci

      - name: Build MoonBit release JS
        working-directory: examples/incr_tea_7guis
        run: npm run build:moonbit

      - name: Build Vite bundle
        working-directory: examples/incr_tea_7guis
        run: npx vite build

      - name: Install Playwright chromium + system deps
        working-directory: examples/incr_tea_7guis
        run: npx playwright install chromium --with-deps

      - name: Run Playwright DOM test
        working-directory: examples/incr_tea_7guis
        run: node scripts/test-dom.mjs
